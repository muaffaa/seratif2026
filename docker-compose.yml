version: '3.8'

services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: seratif_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-seratif2026}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_password}
      MYSQL_USER: ${DB_USER:-seratif_user}
      MYSQL_PASSWORD: ${DB_PASS:-user_password}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - seratif_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seratif_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-seratif2026}
      DB_USER: ${DB_USER:-seratif_user}
      DB_PASS: ${DB_PASS:-user_password}
      APP_ENV: ${APP_ENV:-production}
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/uploads:/var/www/html/uploads
    networks:
      - seratif_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 10s
      retries: 5

  # React Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: seratif_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:80
    networks:
      - seratif_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      timeout: 10s
      retries: 5

  # Optional: phpMyAdmin untuk debugging database
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: seratif_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-seratif_user}
      PMA_PASSWORD: ${DB_PASS:-user_password}
      PMA_ARBITRARY: "1"
    ports:
      - "8080:80"
    networks:
      - seratif_network

volumes:
  db_data:
    driver: local

networks:
  seratif_network:
    driver: bridge
